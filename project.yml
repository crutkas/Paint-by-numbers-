name: PaintByNumbers
options:
  bundleIdPrefix: com.example.paintbynumbers
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad (universal)
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTS_MACCATALYST: NO

packages:
  PBNCore:
    path: .

targets:
  PaintByNumbers:
    type: application
    platform: iOS
    sources:
      - path: App/PaintByNumbers
    resources:
      - path: App/PaintByNumbers/Resources
    info:
      path: App/PaintByNumbers/Info.plist
      properties:
        CFBundleDisplayName: Paint by Numbers
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryAddUsageDescription: >-
          Paint by Numbers saves your finished masterpieces to your Photos.
        NSCameraUsageDescription: >-
          Paint by Numbers uses the camera so kids can snap a picture and turn it
          into a paint-by-numbers puzzle.
        CFBundleURLTypes:
          - CFBundleURLName: com.example.paintbynumbers.import
            CFBundleURLSchemes:
              - paintbynumbers
        CFBundleDocumentTypes:
          - CFBundleTypeName: Image
            LSHandlerRank: Alternate
            CFBundleTypeRole: Editor
            LSItemContentTypes:
              - public.image
    entitlements:
      path: App/PaintByNumbers/PaintByNumbers.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.paintbynumbers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.paintbynumbers
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: PBNCore
        product: PBNCore
      - target: PBNShareExtension

  PBNShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Paint by Numbers
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
    entitlements:
      path: ShareExtension/PBNShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.example.paintbynumbers
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.paintbynumbers.ShareExtension
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: PBNCore
        product: PBNCore

schemes:
  PaintByNumbers:
    build:
      targets:
        PaintByNumbers: all
        PBNShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
